<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <radialGradient id="r1" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#FF7070"/><stop offset="100%" stop-color="#CC0000"/></radialGradient>
    <radialGradient id="r2" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#FFB060"/><stop offset="100%" stop-color="#E06000"/></radialGradient>
    <radialGradient id="r3" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#FFE860"/><stop offset="100%" stop-color="#C09000"/></radialGradient>
    <radialGradient id="r4" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#60E060"/><stop offset="100%" stop-color="#007A00"/></radialGradient>
    <radialGradient id="r5" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#60C8FF"/><stop offset="100%" stop-color="#005FA0"/></radialGradient>
    <radialGradient id="r6" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#B060FF"/><stop offset="100%" stop-color="#5A00C0"/></radialGradient>
    <radialGradient id="r7" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#FF80C0"/><stop offset="100%" stop-color="#C00060"/></radialGradient>
    <radialGradient id="r8" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#40E8E0"/><stop offset="100%" stop-color="#007878"/></radialGradient>
    <radialGradient id="r9" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#90FF60"/><stop offset="100%" stop-color="#207000"/></radialGradient>
    <radialGradient id="gloss" cx="30%" cy="20%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Row 1 -->
    <!-- Red -->
    <rect x="8"  y="8"  width="20" height="20" rx="6" fill="#CC0000"/>
    <rect x="7"  y="7"  width="20" height="20" rx="6" fill="url(#r1)"/>
    <ellipse cx="13" cy="12" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Orange -->
    <rect x="30" y="8"  width="20" height="20" rx="6" fill="#E06000"/>
    <rect x="29" y="7"  width="20" height="20" rx="6" fill="url(#r2)"/>
    <ellipse cx="35" cy="12" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Yellow -->
    <rect x="52" y="8"  width="20" height="20" rx="6" fill="#C09000"/>
    <rect x="51" y="7"  width="20" height="20" rx="6" fill="url(#r3)"/>
    <ellipse cx="57" cy="12" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Row 2 -->
    <!-- Green -->
    <rect x="8"  y="30" width="20" height="20" rx="6" fill="#007A00"/>
    <rect x="7"  y="29" width="20" height="20" rx="6" fill="url(#r4)"/>
    <ellipse cx="13" cy="34" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Blue -->
    <rect x="30" y="30" width="20" height="20" rx="6" fill="#005FA0"/>
    <rect x="29" y="29" width="20" height="20" rx="6" fill="url(#r5)"/>
    <ellipse cx="35" cy="34" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Purple -->
    <rect x="52" y="30" width="20" height="20" rx="6" fill="#5A00C0"/>
    <rect x="51" y="29" width="20" height="20" rx="6" fill="url(#r6)"/>
    <ellipse cx="57" cy="34" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Row 3 -->
    <!-- Pink -->
    <rect x="8"  y="52" width="20" height="20" rx="6" fill="#C00060"/>
    <rect x="7"  y="51" width="20" height="20" rx="6" fill="url(#r7)"/>
    <ellipse cx="13" cy="56" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Teal -->
    <rect x="30" y="52" width="20" height="20" rx="6" fill="#007878"/>
    <rect x="29" y="51" width="20" height="20" rx="6" fill="url(#r8)"/>
    <ellipse cx="35" cy="56" rx="5" ry="3" fill="url(#gloss)"/>
    <!-- Lime -->
    <rect x="52" y="52" width="20" height="20" rx="6" fill="#207000"/>
    <rect x="51" y="51" width="20" height="20" rx="6" fill="url(#r9)"/>
    <ellipse cx="57" cy="56" rx="5" ry="3" fill="url(#gloss)"/>
  </g>
</svg>
