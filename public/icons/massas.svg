<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <radialGradient id="bowlG" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#E8EEF5"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </radialGradient>
    <radialGradient id="sauceG" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="55%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <radialGradient id="gloss" cx="30%" cy="22%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Bowl shadow -->
    <ellipse cx="40" cy="73" rx="24" ry="4" fill="rgba(0,0,0,0.2)"/>
    <!-- Bowl outer body -->
    <path d="M10 40 Q10 74 40 75 Q70 74 70 40 Z" fill="#90A4AE"/>
    <!-- Bowl inner -->
    <path d="M11 40 Q11 73 40 74 Q69 73 69 40 Z" fill="url(#bowlG)"/>
    <!-- Bowl rim ellipse -->
    <ellipse cx="40" cy="40" rx="29" ry="7" fill="#CFD8DC"/>
    <ellipse cx="40" cy="39" rx="28" ry="6" fill="#ECEFF1"/>
    <ellipse cx="40" cy="38.5" rx="27" ry="5.5" fill="#FAFAFA"/>
    <!-- Bowl rim gloss -->
    <ellipse cx="30" cy="38" rx="12" ry="3" fill="rgba(255,255,255,0.7)"/>
    <!-- Sauce base -->
    <ellipse cx="40" cy="52" rx="22" ry="14" fill="#B71C1C"/>
    <ellipse cx="40" cy="51" rx="21" ry="13" fill="url(#sauceG)"/>
    <!-- Sauce gloss -->
    <ellipse cx="34" cy="44" rx="8" ry="4" fill="rgba(255,150,100,0.35)"/>
    <!-- Pasta strands (spaghetti) - multiple wavy lines -->
    <path d="M20 50 Q24 44 28 50 Q32 56 36 50 Q40 44 44 50 Q48 56 52 50 Q56 44 60 50" stroke="#F5CA80" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M19 55 Q23 49 27 55 Q31 61 35 55 Q39 49 43 55 Q47 61 51 55 Q55 49 59 55" stroke="#E8B86A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M22 46 Q26 41 30 46 Q34 51 38 46 Q42 41 46 46 Q50 51 54 46 Q57 42 60 46" stroke="#F5D090" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M21 60 Q25 55 29 60 Q33 65 37 60 Q41 55 45 60 Q49 65 53 60 Q57 55 59 60" stroke="#DCA858" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Basil leaf -->
    <ellipse cx="40" cy="39" rx="7" ry="4" fill="#2DB34A" transform="rotate(-25 40 39)"/>
    <ellipse cx="40" cy="39" rx="5.5" ry="3" fill="#48C860" transform="rotate(-25 40 39)"/>
    <line x1="37" y1="40.5" x2="43.5" y2="37.5" stroke="#1A8A35" stroke-width="0.8"/>
    <line x1="38" y1="38.5" x2="40" y2="36" stroke="#1A8A35" stroke-width="0.6"/>
    <line x1="40.5" y1="39.5" x2="43" y2="38" stroke="#1A8A35" stroke-width="0.6"/>
    <!-- Fork -->
    <line x1="62" y1="18" x2="62" y2="50" stroke="#CFD8DC" stroke-width="3" stroke-linecap="round"/>
    <line x1="62" y1="18" x2="62" y2="50" stroke="#ECEFF1" stroke-width="2" stroke-linecap="round"/>
    <!-- Fork tines -->
    <line x1="58" y1="18" x2="58" y2="28" stroke="#ECEFF1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="18" x2="60" y2="29" stroke="#ECEFF1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="18" x2="62" y2="29" stroke="#ECEFF1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="64" y1="18" x2="64" y2="28" stroke="#ECEFF1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M58 28 Q61 32 64 28" stroke="#ECEFF1" stroke-width="1.5" fill="none"/>
    <!-- Fork pasta twirl on top -->
    <path d="M60 35 Q63 30 66 35 Q63 38 60 35 Z" stroke="#F5CA80" stroke-width="2" fill="none"/>
    <path d="M61 33 Q64 28 67 33 Q64 36 61 33 Z" stroke="#E8B86A" stroke-width="1.5" fill="none"/>
    <!-- Bowl gloss -->
    <ellipse cx="22" cy="55" rx="6" ry="12" fill="url(#gloss)"/>
  </g>
</svg>
