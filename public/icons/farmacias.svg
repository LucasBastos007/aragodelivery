<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <linearGradient id="bottleG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="capG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <radialGradient id="pillG" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </radialGradient>
    <radialGradient id="gloss" cx="30%" cy="20%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Bottle shadow/base -->
    <rect x="22" y="28" width="28" height="42" rx="6" fill="#0D47A1"/>
    <!-- Bottle body -->
    <rect x="21" y="27" width="28" height="42" rx="6" fill="url(#bottleG)"/>
    <!-- Bottle neck -->
    <rect x="29" y="18" width="12" height="12" rx="3" fill="#1565C0"/>
    <rect x="28" y="17" width="12" height="12" rx="3" fill="#1E88E5"/>
    <!-- Cap -->
    <rect x="26" y="11" width="16" height="9" rx="4" fill="#0D47A1"/>
    <rect x="25" y="10" width="16" height="9" rx="4" fill="url(#capG)"/>
    <!-- Cap highlight -->
    <ellipse cx="33" cy="12" rx="5" ry="2" fill="rgba(255,255,255,0.4)"/>
    <!-- Red cross label -->
    <rect x="27" y="35" width="18" height="18" rx="3" fill="white" fill-opacity="0.95"/>
    <!-- Cross horizontal -->
    <rect x="28" y="41" width="16" height="6" rx="2" fill="#E53935"/>
    <!-- Cross vertical -->
    <rect x="34" y="36" width="6" height="16" rx="2" fill="#E53935"/>
    <!-- Label lines below cross -->
    <line x1="29" y1="56" x2="43" y2="56" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="29" y1="59" x2="43" y2="59" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="29" y1="62" x2="38" y2="62" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Bottle gloss highlight -->
    <rect x="25" y="29" width="6" height="30" rx="3" fill="rgba(255,255,255,0.22)"/>
    <ellipse cx="28" cy="34" rx="4" ry="6" fill="url(#gloss)"/>
    <!-- Pill 1 -->
    <rect x="54" y="48" width="16" height="8" rx="4" fill="#CFD8DC"/>
    <rect x="54" y="48" width="8" height="8" rx="4 0 0 4" fill="white"/>
    <line x1="62" y1="48" x2="62" y2="56" stroke="#B0BEC5" stroke-width="1"/>
    <ellipse cx="58" cy="50" rx="2.5" ry="1.5" fill="rgba(255,255,255,0.6)"/>
    <!-- Pill 2 -->
    <rect x="56" y="60" width="14" height="7" rx="3.5" fill="#FFCDD2"/>
    <rect x="56" y="60" width="7" height="7" rx="3.5 0 0 3.5" fill="#FFEBEE"/>
    <line x1="63" y1="60" x2="63" y2="67" stroke="#EF9A9A" stroke-width="1"/>
    <ellipse cx="59.5" cy="62" rx="2" ry="1.2" fill="rgba(255,255,255,0.55)"/>
    <!-- Pill 3 (small) -->
    <ellipse cx="61" cy="40" rx="5" ry="3" fill="white"/>
    <ellipse cx="61" cy="40" rx="4" ry="2.3" fill="#E3F2FD"/>
    <ellipse cx="59.5" cy="39" rx="1.8" ry="1" fill="rgba(255,255,255,0.7)"/>
  </g>
</svg>
