<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <linearGradient id="crustG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD580"/>
      <stop offset="50%" stop-color="#E89010"/>
      <stop offset="100%" stop-color="#C06800"/>
    </linearGradient>
    <linearGradient id="sauceG" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="cheeseG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFE84D"/>
      <stop offset="100%" stop-color="#F0B800"/>
    </linearGradient>
    <radialGradient id="gloss" cx="35%" cy="18%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peppG" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Pizza slice triangle (pointing down) -->
    <!-- Crust outer edge -->
    <path d="M40 76 L5 10 L75 10 Z" fill="#C06800"/>
    <!-- Crust ring -->
    <path d="M40 70 L8 13 L72 13 Z" fill="url(#crustG)"/>
    <!-- Crust bumps/air bubbles -->
    <circle cx="14" cy="12" r="3" fill="#E8A020"/>
    <circle cx="26" cy="10.5" r="2.5" fill="#FFD060"/>
    <circle cx="40" cy="10" r="3.5" fill="#E8A020"/>
    <circle cx="54" cy="10.5" r="2.5" fill="#FFD060"/>
    <circle cx="66" cy="12" r="3" fill="#E8A020"/>
    <!-- Crust top gloss -->
    <path d="M10 12 Q40 8 70 12" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Sauce layer -->
    <path d="M40 66 L11 16 L69 16 Z" fill="url(#sauceG)"/>
    <!-- Cheese layer -->
    <path d="M40 62 L13 19 L67 19 Z" fill="url(#cheeseG)"/>
    <!-- Cheese bubbles -->
    <circle cx="28" cy="30" r="4" fill="#F9A825"/>
    <circle cx="52" cy="28" r="3.5" fill="#F9A825"/>
    <circle cx="22" cy="42" r="3" fill="#F9A825"/>
    <circle cx="55" cy="42" r="3.5" fill="#F9A825"/>
    <circle cx="40" cy="52" r="3" fill="#F9A825"/>
    <!-- Cheese stretchy pull effect at tip -->
    <path d="M38 66 Q39 73 40 76 Q41 73 42 66" stroke="#F0B800" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Pepperoni 1 (center) -->
    <circle cx="40" cy="36" r="8" fill="#7F0000"/>
    <circle cx="40" cy="36" r="7" fill="url(#peppG)"/>
    <circle cx="40" cy="36" r="3" fill="rgba(150,0,0,0.5)"/>
    <ellipse cx="37" cy="33" rx="2.5" ry="1.5" fill="rgba(255,180,160,0.3)"/>
    <!-- Pepperoni 2 (left) -->
    <circle cx="22" cy="52" r="7" fill="#7F0000"/>
    <circle cx="22" cy="52" r="6" fill="url(#peppG)"/>
    <ellipse cx="20" cy="49" rx="2" ry="1.2" fill="rgba(255,180,160,0.3)"/>
    <!-- Pepperoni 3 (right) -->
    <circle cx="58" cy="52" r="7" fill="#7F0000"/>
    <circle cx="58" cy="52" r="6" fill="url(#peppG)"/>
    <ellipse cx="56" cy="49" rx="2" ry="1.2" fill="rgba(255,180,160,0.3)"/>
    <!-- Pepperoni 4 (small top-left) -->
    <circle cx="26" cy="24" r="5" fill="#7F0000"/>
    <circle cx="26" cy="24" r="4.2" fill="url(#peppG)"/>
    <!-- Pepperoni 5 (small top-right) -->
    <circle cx="54" cy="24" r="5" fill="#7F0000"/>
    <circle cx="54" cy="24" r="4.2" fill="url(#peppG)"/>
    <!-- Green herb dots -->
    <circle cx="35" cy="28" r="1.8" fill="#4CAF50"/>
    <circle cx="47" cy="32" r="1.5" fill="#4CAF50"/>
    <circle cx="33" cy="47" r="1.5" fill="#4CAF50"/>
    <circle cx="48" cy="60" r="1.2" fill="#4CAF50"/>
    <!-- Overall gloss -->
    <path d="M40 70 L12 16 L35 16 L40 50 Z" fill="url(#gloss)" opacity="0.55"/>
  </g>
</svg>
