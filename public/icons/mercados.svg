<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <radialGradient id="basketG" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="55%" stop-color="#E00000"/>
      <stop offset="100%" stop-color="#9A0000"/>
    </radialGradient>
    <radialGradient id="handleG" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF7070"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </radialGradient>
    <radialGradient id="gloss" cx="32%" cy="22%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Basket body -->
    <path d="M14 38 Q13 66 40 67 Q67 66 66 38 Z" fill="#9A0000"/>
    <path d="M14 38 Q13 65 40 66 Q67 65 66 38 L62 36 Q62 62 40 63 Q18 62 18 36 Z" fill="url(#basketG)"/>
    <!-- Basket weave lines horizontal -->
    <path d="M16 46 Q40 48 64 46" stroke="rgba(180,0,0,0.5)" stroke-width="1.2" fill="none"/>
    <path d="M15 54 Q40 56 65 54" stroke="rgba(180,0,0,0.5)" stroke-width="1.2" fill="none"/>
    <path d="M16 62 Q40 64 64 62" stroke="rgba(180,0,0,0.5)" stroke-width="1" fill="none"/>
    <!-- Basket weave lines vertical -->
    <line x1="25" y1="38" x2="23" y2="65" stroke="rgba(180,0,0,0.4)" stroke-width="1"/>
    <line x1="32" y1="37" x2="31" y2="66" stroke="rgba(180,0,0,0.4)" stroke-width="1"/>
    <line x1="40" y1="37" x2="40" y2="66" stroke="rgba(180,0,0,0.4)" stroke-width="1"/>
    <line x1="48" y1="37" x2="49" y2="66" stroke="rgba(180,0,0,0.4)" stroke-width="1"/>
    <line x1="55" y1="38" x2="57" y2="65" stroke="rgba(180,0,0,0.4)" stroke-width="1"/>
    <!-- Basket rim -->
    <path d="M14 38 Q40 43 66 38 Q40 34 14 38 Z" fill="#FF4040"/>
    <path d="M14 38 Q40 41 66 38" stroke="#FF6060" stroke-width="0.8" fill="none"/>
    <!-- Items inside basket -->
    <!-- Green lettuce/leaves -->
    <path d="M20 36 Q24 28 28 33 Q32 26 36 33 Q32 29 28 34 Q24 30 20 36 Z" fill="#2DB34A"/>
    <path d="M36 34 Q38 26 42 31 Q38 28 36 34 Z" fill="#3CC455"/>
    <!-- Orange carrot -->
    <path d="M42 34 Q45 24 48 34 Q47 36 45 36 Q43 36 42 34 Z" fill="#FF6B00"/>
    <path d="M45 24 Q44 21 43 22 M45 24 Q46 21 47 22 M45 24 Q45 21 45 22" stroke="#2DB34A" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <!-- Red apple -->
    <circle cx="54" cy="31" r="7" fill="#CC2200"/>
    <circle cx="54" cy="31" r="6" fill="#E83A1A"/>
    <path d="M54 24 Q55 22 57 22" stroke="#4A7A00" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <ellipse cx="51" cy="28" rx="2" ry="3" fill="rgba(255,255,255,0.2)"/>
    <!-- Yellow banana curve -->
    <path d="M20 33 Q22 26 28 28 Q30 29 29 33" stroke="#FFD700" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Handle -->
    <path d="M26 38 Q26 20 40 18 Q54 20 54 38" stroke="#CC0000" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M26 38 Q26 21 40 19 Q54 21 54 38" stroke="url(#handleG)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Handle gloss -->
    <path d="M30 30 Q32 24 40 22 Q48 24 50 30" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Basket gloss -->
    <ellipse cx="30" cy="44" rx="10" ry="5" fill="rgba(255,255,255,0.18)"/>
    <ellipse cx="28" cy="43" rx="6" ry="3" fill="url(#gloss)"/>
  </g>
</svg>
