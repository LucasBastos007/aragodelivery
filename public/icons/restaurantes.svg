<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <radialGradient id="bunT" cx="38%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FFD580"/>
      <stop offset="55%" stop-color="#E8920A"/>
      <stop offset="100%" stop-color="#A85500"/>
    </radialGradient>
    <radialGradient id="bunB" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F5A820"/>
      <stop offset="100%" stop-color="#C07010"/>
    </radialGradient>
    <radialGradient id="pattyG" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7D4F32"/>
      <stop offset="100%" stop-color="#3A1A08"/>
    </radialGradient>
    <linearGradient id="cheeseG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE64D"/>
      <stop offset="100%" stop-color="#F0B500"/>
    </linearGradient>
    <radialGradient id="gloss" cx="33%" cy="22%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Bun bottom -->
    <ellipse cx="40" cy="66" rx="23" ry="7.5" fill="#B86800"/>
    <ellipse cx="40" cy="64" rx="23" ry="7" fill="#D4820A"/>
    <ellipse cx="40" cy="62.5" rx="22" ry="6" fill="url(#bunB)"/>
    <ellipse cx="34" cy="61" rx="10" ry="2.5" fill="rgba(255,255,255,0.22)"/>
    <!-- Cheese drips -->
    <path d="M17 52 Q15 56 16 60 L18 60 L17 56 Z" fill="#F0B500"/>
    <path d="M63 52 Q65 56 64 60 L62 60 L63 56 Z" fill="#F0B500"/>
    <!-- Cheese layer -->
    <path d="M16 50 L64 50 L64 56 Q54 54 40 55 Q26 54 16 56 Z" fill="url(#cheeseG)"/>
    <!-- Patty -->
    <ellipse cx="40" cy="47" rx="23" ry="5.5" fill="#2A0F00"/>
    <ellipse cx="40" cy="45.5" rx="23" ry="5" fill="url(#pattyG)"/>
    <path d="M22 44.5 Q32 43.5 42 44.5 Q52 43.5 58 44.5" stroke="#1A0800" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Tomato -->
    <ellipse cx="40" cy="40" rx="22" ry="4.5" fill="#C02000"/>
    <ellipse cx="40" cy="38.5" rx="21" ry="4" fill="#E83A1A"/>
    <ellipse cx="29" cy="38.5" rx="3.5" ry="2" fill="rgba(255,100,50,0.45)"/>
    <ellipse cx="40" cy="38.5" rx="3.5" ry="2" fill="rgba(255,100,50,0.45)"/>
    <ellipse cx="51" cy="38.5" rx="3.5" ry="2" fill="rgba(255,100,50,0.45)"/>
    <!-- Lettuce -->
    <path d="M17 33 Q22 29 27 33 Q32 29 37 33 Q42 29 47 33 Q52 29 57 33 Q60 31 63 33 L63 37 Q60 34 57 37 Q52 32 47 37 Q42 32 37 37 Q32 32 27 37 Q22 32 17 37 Z" fill="#2DB34A"/>
    <path d="M17 33 Q22 30 27 33 Q32 30 37 33 Q42 30 47 33 Q52 30 57 33" stroke="#1A8A35" stroke-width="0.6" fill="none"/>
    <!-- Bun top -->
    <ellipse cx="40" cy="23" rx="24" ry="13" fill="#A05000"/>
    <ellipse cx="40" cy="21" rx="24" ry="12.5" fill="#D4820A"/>
    <ellipse cx="40" cy="19" rx="23" ry="11.5" fill="url(#bunT)"/>
    <!-- Sesame seeds -->
    <ellipse cx="31" cy="16" rx="2.5" ry="1.3" fill="#B06A10" transform="rotate(-15 31 16)"/>
    <ellipse cx="40" cy="13" rx="2.5" ry="1.3" fill="#B06A10"/>
    <ellipse cx="49" cy="16" rx="2.5" ry="1.3" fill="#B06A10" transform="rotate(15 49 16)"/>
    <ellipse cx="35" cy="20" rx="2" ry="1.1" fill="#B06A10" transform="rotate(-8 35 20)"/>
    <ellipse cx="45" cy="20" rx="2" ry="1.1" fill="#B06A10" transform="rotate(8 45 20)"/>
    <!-- Gloss -->
    <ellipse cx="33" cy="15" rx="15" ry="8" fill="url(#gloss)"/>
