<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
    <radialGradient id="pratoG" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0ede8"/>
      <stop offset="100%" stop-color="#d4cfc8"/>
    </radialGradient>
    <radialGradient id="aroG" cx="38%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#e8e3dc"/>
      <stop offset="100%" stop-color="#bdb5aa"/>
    </radialGradient>
    <radialGradient id="carneG" cx="38%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#c0622a"/>
      <stop offset="55%" stop-color="#9a3e12"/>
      <stop offset="100%" stop-color="#6b2008"/>
    </radialGradient>
    <radialGradient id="saladaG" cx="35%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#6fcf5a"/>
      <stop offset="100%" stop-color="#2d7a1a"/>
    </radialGradient>
    <radialGradient id="legG" cx="35%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#e06b00"/>
    </radialGradient>
    <radialGradient id="gloss" cx="28%" cy="20%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#sh)">
    <!-- Sombra do prato -->
    <ellipse cx="40" cy="58" rx="28" ry="5" fill="rgba(0,0,0,0.12)"/>

    <!-- Aro externo do prato -->
    <ellipse cx="40" cy="46" rx="28" ry="8" fill="#bdb5aa"/>
    <ellipse cx="40" cy="45" rx="28" ry="8" fill="url(#aroG)"/>

    <!-- Prato principal -->
    <ellipse cx="40" cy="44" rx="25" ry="7" fill="#c8c2bb"/>
    <ellipse cx="40" cy="43" rx="25" ry="7" fill="url(#pratoG)"/>

    <!-- Área central côncava -->
    <ellipse cx="40" cy="42" rx="18" ry="5" fill="#ece7e0"/>

    <!-- Carne grelhada -->
    <ellipse cx="40" cy="41" rx="10" ry="3.5" fill="#6b2008"/>
    <ellipse cx="40" cy="40.5" rx="10" ry="3.2" fill="url(#carneG)"/>
    <path d="M33 39.5 Q40 37.5 47 39.5" stroke="rgba(80,20,0,0.5)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M34 41 Q40 39 46 41" stroke="rgba(80,20,0,0.4)" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- Salada verde -->
    <path d="M28 41 Q30 37 33 39 Q31 43 28 42 Z" fill="url(#saladaG)"/>
    <path d="M30 40 Q32 36 35 38 Q33 42 30 41 Z" fill="#4ab832"/>

    <!-- Legume laranja -->
    <ellipse cx="49" cy="40" rx="4" ry="2.5" fill="url(#legG)" transform="rotate(-15 49 40)"/>
    <ellipse cx="50" cy="38.5" rx="3.2" ry="2" fill="#ffca6a" transform="rotate(-15 50 38.5)"/>

    <!-- Reflexo do prato -->
    <ellipse cx="35" cy="40" rx="8" ry="2.5" fill="url(#gloss)" opacity="0.6"/>

    <!-- Garfo esquerda -->
    <rect x="12.5" y="16" width="2.5" height="28" rx="1.2" fill="#c8c2bb"/>
    <rect x="12" y="15" width="2.5" height="28" rx="1.2" fill="#e8e2da"/>
    <rect x="11.5" y="15" width="0.9" height="8" rx="0.45" fill="#d4cec6"/>
    <rect x="13"   y="15" width="0.9" height="8" rx="0.45" fill="#d4cec6"/>
    <rect x="14.5" y="15" width="0.9" height="8" rx="0.45" fill="#d4cec6"/>
    <rect x="12.8" y="22" width="1.4" height="2" fill="#c8c2ba"/>

    <!-- Faca direita -->
    <rect x="65.5" y="16" width="2.5" height="28" rx="1.2" fill="#c8c2bb"/>
    <rect x="65"   y="15" width="2.5" height="28" rx="1.2" fill="#e8e2da"/>
    <path d="M65 15 Q68.5 21 68 26 L65 26 Z" fill="#d0cac2"/>
    <path d="M65.5 16 Q68 21 67.5 25" stroke="rgba(255,255,255,0.6)" stroke-width="0.5" fill="none"/>
  </g>
</svg>
