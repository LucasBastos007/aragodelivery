<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <radialGradient id="clocheG" cx="35%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="40%" stop-color="#C8C8C8"/>
      <stop offset="80%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#606060"/>
    </radialGradient>
    <radialGradient id="handleG" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE680"/>
      <stop offset="50%" stop-color="#D4A000"/>
      <stop offset="100%" stop-color="#9A6C00"/>
    </radialGradient>
    <linearGradient id="plateG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#DCDCDC"/>
    </linearGradient>
    <radialGradient id="gloss" cx="30%" cy="18%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glossH" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#sh)">
    <!-- Plate shadow -->
    <ellipse cx="40" cy="70" rx="26" ry="5" fill="rgba(0,0,0,0.18)"/>
    <!-- Plate rim -->
    <ellipse cx="40" cy="65" rx="26" ry="6" fill="#BDBDBD"/>
    <ellipse cx="40" cy="64" rx="25" ry="5.5" fill="url(#plateG)"/>
    <!-- Plate inner circle -->
    <ellipse cx="40" cy="63" rx="18" ry="4" fill="#F0F0F0"/>
    <!-- Plate gloss -->
    <ellipse cx="34" cy="62" rx="8" ry="2" fill="rgba(255,255,255,0.7)"/>
    <!-- Cloche body -->
    <path d="M14 64 Q14 28 40 22 Q66 28 66 64 Z" fill="#707070"/>
    <path d="M15 64 Q15 29 40 23 Q65 29 65 64 Z" fill="url(#clocheG)"/>
    <!-- Cloche rim (bottom edge) -->
    <ellipse cx="40" cy="64" rx="25.5" ry="5" fill="#A0A0A0"/>
    <ellipse cx="40" cy="63.5" rx="25" ry="4.5" fill="#C8C8C8"/>
    <ellipse cx="40" cy="63" rx="24" ry="3.5" fill="#E0E0E0"/>
    <!-- Handle base disk -->
    <ellipse cx="40" cy="24" rx="8" ry="3" fill="#8A7000"/>
    <ellipse cx="40" cy="23" rx="8" ry="3" fill="#B8900A"/>
    <!-- Handle stem -->
    <rect x="36" y="12" width="8" height="13" rx="4" fill="#8A7000"/>
    <rect x="35" y="11" width="8" height="13" rx="4" fill="url(#handleG)"/>
    <!-- Handle knob top -->
    <ellipse cx="39" cy="11" rx="5" ry="4" fill="#9A6C00"/>
    <ellipse cx="39" cy="10" rx="5" ry="3.5" fill="#D4A800"/>
    <ellipse cx="39" cy="9.5" rx="4.5" ry="3" fill="#FFE060"/>
    <!-- Handle gloss -->
    <ellipse cx="37.5" cy="9" rx="2.5" ry="1.5" fill="url(#glossH)"/>
    <!-- Cloche body gloss (large specular) -->
    <ellipse cx="31" cy="35" rx="14" ry="22" fill="url(#gloss)" opacity="0.7"/>
    <!-- Cloche body reflection line -->
    <path d="M22 60 Q28 35 35 26" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Rim gloss -->
    <ellipse cx="30" cy="63" rx="10" ry="2" fill="rgba(255,255,255,0.5)"/>
  </g>
</svg>
